<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lời tỏ tình</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, #f8e8ff 0%, transparent 28%),
          radial-gradient(circle at bottom right, #e8f4ff 0%, transparent 28%),
          linear-gradient(135deg, #f8fbff 0%, #f0f4ff 40%, #eaeef7 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #2a2a33;
        transition: opacity 0.35s ease;
      }
      .fade-out {
        opacity: 0;
      }
      .background {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .background::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.18) 1px,
          transparent 1px
        );
        background-size: 30px 30px;
        opacity: 0.5;
      }
      .glow {
        position: absolute;
        border-radius: 50%;
        opacity: 0.75;
        filter: blur(24px);
      }
      .glow.one {
        width: 220px;
        height: 220px;
        top: 6%;
        left: 8%;
        background: rgba(255, 198, 112, 0.28);
        animation: floatGlow 12s ease-in-out infinite;
      }
      .glow.two {
        width: 260px;
        height: 260px;
        bottom: 8%;
        right: 10%;
        background: rgba(255, 160, 210, 0.24);
        animation: floatGlow 14s ease-in-out infinite reverse;
      }
      .glow.three {
        width: 180px;
        height: 180px;
        top: 32%;
        right: 18%;
        background: rgba(180, 196, 255, 0.22);
        animation: floatGlow 10s ease-in-out infinite;
      }
      .spark {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 236, 159, 0.98),
          rgba(255, 204, 92, 0.45)
        );
        box-shadow: 0 0 18px rgba(255, 213, 110, 0.65);
        filter: blur(0.5px);
        animation: driftSpark 6s linear infinite;
      }
      .bubble {
        position: absolute;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.12);
        border-radius: 50%;
        box-shadow:
          inset 0 0 10px rgba(255, 255, 255, 0.24),
          0 0 20px rgba(255, 223, 110, 0.12);
        animation: floatBubble 12s linear infinite;
      }
      .bubble:nth-child(1) {
        width: 42px;
        height: 42px;
        bottom: 12%;
        left: 18%;
        animation-delay: 0s;
        animation-duration: 11s;
      }
      .bubble:nth-child(2) {
        width: 32px;
        height: 32px;
        bottom: 18%;
        left: 72%;
        animation-delay: 2s;
        animation-duration: 10.5s;
      }
      .bubble:nth-child(3) {
        width: 54px;
        height: 54px;
        bottom: 8%;
        left: 46%;
        animation-delay: 1.2s;
        animation-duration: 12s;
      }
      .bubble:nth-child(4) {
        width: 28px;
        height: 28px;
        bottom: 20%;
        left: 34%;
        animation-delay: 3.2s;
        animation-duration: 9.6s;
      }
      .bubble:nth-child(5) {
        width: 36px;
        height: 36px;
        bottom: 10%;
        left: 84%;
        animation-delay: 2.8s;
        animation-duration: 11.2s;
      }
      .petal {
        position: absolute;
        width: 18px;
        height: 18px;
        background: radial-gradient(
          circle at 40% 40%,
          #ffd9e5 0%,
          #ff8fb5 55%,
          rgba(255, 255, 255, 0.85) 95%
        );
        border-radius: 55% 45% 50% 50%;
        box-shadow: 0 0 14px rgba(255, 172, 200, 0.45);
        transform: rotate(15deg);
        opacity: 0.95;
        animation: fallPetal linear infinite;
      }
      .petal.one {
        left: 12%;
        top: -8%;
        animation-duration: 12s;
        animation-delay: 0s;
      }
      .petal.two {
        left: 28%;
        top: -10%;
        animation-duration: 10.6s;
        animation-delay: 1.2s;
      }
      .petal.three {
        left: 45%;
        top: -5%;
        animation-duration: 11.3s;
        animation-delay: 0.6s;
      }
      .petal.four {
        left: 62%;
        top: -12%;
        animation-duration: 12.4s;
        animation-delay: 0.9s;
      }
      .petal.five {
        left: 78%;
        top: -7%;
        animation-duration: 10.9s;
        animation-delay: 1.6s;
      }
      .petal.six {
        left: 36%;
        top: -15%;
        animation-duration: 13s;
        animation-delay: 0.2s;
      }
      .petal.seven {
        left: 56%;
        top: -9%;
        animation-duration: 11.8s;
        animation-delay: 1.1s;
      }
      .petal.eight {
        left: 20%;
        top: -6%;
        animation-duration: 10.4s;
        animation-delay: 1.7s;
      }
      @keyframes fallPetal {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.9;
        }
        100% {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0;
        }
      }
      .spark:nth-child(1) {
        top: 15%;
        left: 22%;
        animation-delay: 0s;
      }
      .spark:nth-child(2) {
        top: 25%;
        left: 70%;
        animation-delay: 1.7s;
      }
      .spark:nth-child(3) {
        top: 45%;
        left: 12%;
        animation-delay: 0.9s;
      }
      .spark:nth-child(4) {
        top: 62%;
        left: 78%;
        animation-delay: 2.5s;
      }
      .spark:nth-child(5) {
        top: 80%;
        left: 40%;
        animation-delay: 1.2s;
      }
      @keyframes floatGlow {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-18px) scale(1.05);
        }
      }
      @keyframes driftSpark {
        0% {
          opacity: 0;
          transform: translateY(0) scale(0.6);
        }
        20% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-180px) scale(1);
        }
      }
      @keyframes floatBubble {
        0% {
          opacity: 0.18;
          transform: translateY(0) scale(0.85);
        }
        40% {
          opacity: 0.45;
        }
        100% {
          opacity: 0;
          transform: translateY(-140vh) scale(1.1);
        }
      }
      .card {
        width: min(560px, calc(100% - 40px));
        text-align: center;
        padding: 48px 42px;
        border-radius: 34px;
        background: linear-gradient(
          180deg,
          rgba(14, 18, 52, 0.96),
          rgba(9, 12, 36, 0.92)
        );
        border: 1px solid rgba(255, 213, 120, 0.17);
        box-shadow:
          0 40px 120px rgba(8, 14, 42, 0.45),
          inset 0 0 0 1px rgba(255, 211, 122, 0.08);
      }
      .title {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 2.6rem);
        letter-spacing: 0.08em;
        color: #ffe3a2;
        text-shadow: 0 10px 22px rgba(255, 198, 95, 0.18);
        position: relative;
      }
      .title::after {
        content: "";
        display: block;
        width: 80px;
        height: 4px;
        margin: 16px auto 0;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 214, 112, 0.95),
          rgba(255, 255, 255, 0.3)
        );
      }
      .message {
        margin: 0 auto 38px;
        max-width: 520px;
        font-size: 1rem;
        line-height: 1.9;
        color: rgba(255, 245, 225, 0.95);
        min-height: 110px;
        opacity: 0;
      }
      .buttons {
        position: relative;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      button {
        position: absolute;
        min-width: 150px;
        padding: 14px 24px;
        border: none;
        border-radius: 999px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.25s ease,
          background 0.2s ease,
          box-shadow 0.2s ease;
      }
      #yes {
        left: calc(50% - 130px);
        top: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #f2c84b 0%, #ffde79 100%);
        color: #1f1a10;
        box-shadow: 0 18px 32px rgba(255, 200, 80, 0.35);
      }
      #no {
        left: calc(50% + 10px);
        top: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.08);
        color: #f9e3b7;
        border: 2px solid rgba(255, 212, 119, 0.6);
        backdrop-filter: blur(10px);
      }
      #yes:hover,
      #no:hover {
        transform: translate(-50%, -50%) scale(1.04);
      }
      #yes:focus,
      #no:focus {
        outline: none;
        box-shadow: 0 0 0 4px rgba(255, 214, 110, 0.22);
      }
      button {
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      .fade-in {
        animation: fadeInText 0.8s ease forwards;
      }
      @keyframes fadeInText {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="background">
      <span class="glow one"></span>
      <span class="glow two"></span>
      <span class="glow three"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="spark"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="petal one"></span>
      <span class="petal two"></span>
      <span class="petal three"></span>
      <span class="petal four"></span>
      <span class="petal five"></span>
      <span class="petal six"></span>
      <span class="petal seven"></span>
      <span class="petal eight"></span>
    </div>
    <div class="card">
      <h1 class="title">Lời ngỏ chân thành</h1>
      <p id="message" class="message"></p>
      <div class="buttons">
        <button id="yes">Đồng ý</button>
        <button id="no">Không đồng ý</button>
      </div>
    </div>
    <script>
      const noBtn = document.getElementById("no");
      const buttons = document.querySelector(".buttons");
      const yesBtn = document.getElementById("yes");
      const message = document.getElementById("message");

      const text =
        "Em à, anh muốn nói với em rằng mỗi ngày bên em là một ngày anh cảm thấy may mắn. Anh không cần hứa quá nhiều, chỉ cần em đồng ý để chúng ta cùng viết tiếp những điều đẹp đẽ.";

      function typeText(text, element, speed = 40) {
        let index = 0;
        element.textContent = "";
        element.style.opacity = "1";
        element.classList.add("fade-in");
        const timer = setInterval(() => {
          element.textContent += text[index];
          index += 1;
          if (index >= text.length) {
            clearInterval(timer);
          }
        }, speed);
      }

      function moveNo() {
        const area = buttons.getBoundingClientRect();
        const btn = noBtn.getBoundingClientRect();
        const padding = 20;
        const maxX = area.width - btn.width - padding;
        const maxY = area.height - btn.height - padding;

        const offsetX =
          Math.random() * maxX - (area.width / 2 - btn.width / 2 - padding / 2);
        const offsetY =
          Math.random() * maxY -
          (area.height / 2 - btn.height / 2 - padding / 2);

        noBtn.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))`;
      }

      function avoidCursor(event) {
        const rect = noBtn.getBoundingClientRect();
        const x = event.clientX;
        const y = event.clientY;
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const distance = Math.hypot(centerX - x, centerY - y);
        const safeRadius = rect.width * 0.8;

        if (distance < safeRadius) {
          moveNo();
        }
      }

      buttons.addEventListener("mousemove", avoidCursor);
      noBtn.addEventListener("touchstart", moveNo);

      yesBtn.addEventListener("click", () => {
        yesBtn.textContent = "Đang đến trang ước hẹn...";
        yesBtn.style.background = "#2e4f8a";
        yesBtn.style.boxShadow = "0 14px 28px rgba(46, 79, 138, 0.22)";
        document.body.classList.add("fade-out");
        setTimeout(() => {
          window.location.href = "thankyou.html";
        }, 360);
      });

      window.addEventListener("DOMContentLoaded", () => {
        typeText(text, message, 35);
      });
    </script>
  </body>
</html>
